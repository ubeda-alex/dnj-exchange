name = "dnj-exchange"
main = "src/index.js"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "dnj-exchange"
database_id = "f601cc47-7061-44b8-97b6-550154f60478"   # wrangler d1 create dnj-exchange will replace this

# Cron trigger — matchmaking every minute (minimum interval in Workers)
[triggers]
crons = ["* * * * *"]

# Variables de entorno (secretos se agregan con: wrangler secret put NOMBRE)
[vars]
ENVIRONMENT = "production"
