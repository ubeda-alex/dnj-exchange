name = "dnj-exchange"
main = "src/index.js"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "dnj-exchange"
database_id = "ffaf864a-c4e9-4ade-b057-2e50766860b6"   # wrangler d1 create dnj-exchange will replace this

# Cron trigger — matchmaking every minute (minimum interval in Workers)
[triggers]
crons = ["* * * * *"]

# Variables de entorno (secretos se agregan con: wrangler secret put NOMBRE)
[vars]
ENVIRONMENT = "production"
ALLOWED_COUNTRIES = "CR"
